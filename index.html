<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para o Amor da Minha Vida ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    color:white;
    margin:0;
}

.container{
    padding:50px 20px;
}

img{
    width:250px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
    font-size:3rem;
}

.card{
    background:rgba(255,255,255,0.15);
    margin:20px auto;
    max-width:700px;
    padding:20px;
    border-radius:20px;
}
</style>
</head>

<body>

<div class="container">
    <h1>❤️ Para Minha Princesa ❤️</h1>

    <img src="foto.jpg" alt="Nós dois">

    <div class="card">
        <h2>Minha Carta Para Você</h2>
        <p>
            Desde que você entrou na minha vida,
            tudo ficou mais bonito. Obrigado por cada
            sorriso, abraço e momento ao seu lado.
            Eu te amo infinitamente. ❤️
        </p>
    </div>

    <div class="card">
        <h2>Nossa História</h2>
        <p>
            Tudo começou quando...
        </p>
    </div>

    <div class="card">
        <h2>💖 Te Amo 💖</h2>
    </div>
</div>

</body>
</html>
